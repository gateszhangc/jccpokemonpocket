apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  namespace: ${K8S_BUILD_NAMESPACE}
  labels:
    app.kubernetes.io/name: jccpokemonpocket
    app.kubernetes.io/component: image-build
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: ${K8S_JOB_TTL_SECONDS}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jccpokemonpocket
        app.kubernetes.io/component: image-build
    spec:
      restartPolicy: Never
      serviceAccountName: ${K8S_BUILD_SERVICE_ACCOUNT}
      volumes:
        - name: workspace
          emptyDir: {}
        - name: docker-config
          secret:
            secretName: ${K8S_DOCKER_CONFIG_SECRET}
            items:
              - key: .dockerconfigjson
                path: config.json
        - name: github-token
          secret:
            secretName: ${K8S_GITHUB_TOKEN_SECRET}
            optional: true
            items:
              - key: ${K8S_GITHUB_TOKEN_KEY}
                path: token
      initContainers:
        - name: fetch-source
          image: alpine:3.21
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              apk add --no-cache curl tar >/dev/null
              public_archive_url="https://github.com/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz"
              private_archive_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}"
              token_file="/var/run/secrets/github/token"

              if [ -f "$token_file" ]; then
                auth_header="Authorization: Bearer $(cat "$token_file")"
                curl -fsSL \
                  -H "$auth_header" \
                  -H "Accept: application/vnd.github+json" \
                  "$private_archive_url" \
                  -o /workspace/src.tar.gz
              else
                curl -fsSL "$public_archive_url" -o /workspace/src.tar.gz
              fi

              tar -xzf /workspace/src.tar.gz -C /workspace --strip-components=1
              rm /workspace/src.tar.gz
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: github-token
              mountPath: /var/run/secrets/github
              readOnly: true
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:v1.23.2
          args:
            - --context=dir:///workspace
            - --dockerfile=/workspace/${DOCKERFILE_PATH}
            - --destination=${IMAGE_NAME}:${IMAGE_TAG}
            - --cache=true
            - --cache-repo=${CACHE_REPO}
            - --snapshot-mode=redo
            - --use-new-run
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: docker-config
              mountPath: /kaniko/.docker
              readOnly: true
